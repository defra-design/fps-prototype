            const selectedValueProgram = selectBoxProgram.value;
            const selectedTextProgram = selectBoxProgram.options[selectBoxProgram.selectedIndex].text;


            document.getElementById("resultproject").innerHTML = `<b>${selectedText}</b>`;
            document.getElementById("resultprogram").innerHTML = `<b>${selectedTextProgram}</b>`;
        }
