<div class="form-container edit-form-container">
			    <div class="action-buttons edit-action-buttons">
                    <!-- <button class=" btn  " style="color:#fff;background:#0d6efd;">New</button> -->
                    <button class="govuk-button govuk-button--warning sup_margin_0" >Delete</button>
                    <button class="govuk-button sup_margin_0"  >Copy</button>

				<div class="form-container">
                <div class="govuk-form-group  mb-2 ">
                    <label class="govuk-label d-inline-block me-1 label_width" for="costbook-code">Costing Book Code:</label>
                    <input type="text" value="2025/103" class="govuk-input width-200 read-only" id="costbook-code" readonly>
                </div>
                
                <div class="govuk-form-group  mb-2 ">
                     <label class="govuk-label d-inline-block me-1 label_width" for="contract-number">Contract Number:</label>
                    <input type="text" class="govuk-input width-200 " id="contract-number">
                </div>
                
               <div class="govuk-form-group d-flex  mb-2 ">
                    <label class="govuk-label d-inline-block me-1 label_width" for="project-title">Title:</label>
                
					   <textarea class="govuk-textarea sup_margin_0 edit-textarea-wide" id="project-title" >Test TVG</textarea>
                </div>
                
                <div class="govuk-form-group  mb-2">
                    <label class="govuk-label d-inline-block me-1 label_width" for="year-type">Year Type:</label>
                    <select class="govuk-select width-200" id="year-type">
                        <option>Financial Years</option>
						 <option>Project Years</option>
                    </select>
                    <label class="govuk-label d-inline-block me-1 label_width" for="programme">Programme:</label>
                    <select class="govuk-select width-200" id="programme">
                        <option>SSL</option>
                    </select>
                </div>
                
                 <div class="govuk-form-group  mb-2">
                    <label class="govuk-label d-inline-block me-1 label_width" for="customer-name">Customer Name:</label>
                    <select class="govuk-select width-200" id="customer-name">
                        <option>UKRI</option>
                    </select>
                    <label class="govuk-label d-inline-block me-1 label_width" for="disease">Disease:</label>
                    <input type="text" class="govuk-input width-200" id="disease">
                </div>
                
              <div class="govuk-form-group  mb-2">
                   <label class="govuk-label d-inline-block me-1 label_width" for="start-date">Start Date:</label>
                    <input type="text" value="01/04/2025" class="govuk-input width-200" id="start-date">
                    <label class="govuk-label d-inline-block me-1 label_width" for="is-defra-project">Is Defra Project?:</label>
					
    					<div class="edit-inline-row edit-inline-row-defra">
                                        <select class="govuk-select edit-select-min" id="is-defra-project">
                        <option>Yes</option>
						 <option>NO</option>
                    </select>
                                            <span class="edit-info-span">Changing this option will recost <br>existing projects with current rates.</span>
					</div>
					
                    
                    <div class="edit-tooltip-hidden"></div>
                </div>
                
               <div class="govuk-form-group  mb-2">
                    <label class="govuk-label d-inline-block me-1 label_width" for="start-financial-year">Start (Financial) Year:</label>
                    <input type="text" value="2025" class="govuk-input width-200 read-only" id="start-financial-year" readonly>
                    <label class="govuk-label d-inline-block me-1 label_width" for="rate-used">Rate Used (£):</label>
                    <input type="text" class="govuk-input width-200" id="rate-used" >
                </div>
                
                 <div class="govuk-form-group  mb-2">
                    <label class="govuk-label d-inline-block me-1 label_width" for="submitted-firstname" style="overflow-wrap: break-word;
    width: 154px;">Submitted By - Firstname:</label>
                    <input type="text" value="Sarah" class="govuk-input  width-200" id="submitted-firstname">
                    <label class="govuk-label d-inline-block me-1 label_width" for="prepared-by">Prepared by:</label>
                    <select class="govuk-select inline-select" id="prepared-by">
                        <option>Name not found</option>
                    </select>
                </div>
                
                 <div class="govuk-form-group  mb-2">
                    <label class="govuk-label d-inline-block me-1 label_width" for="submitted-lastname">Lastname:</label>
                    <input type="text" value="T" class="govuk-input width-200" id="submitted-lastname">
					
                    <span class="govuk-label d-inline-block me-1 label_width">Include Inflation?:</span>
				
				    <div class="edit-inline-row edit-inline-row-inflate">
                    <!-- <input type="checkbox" class="govuk-checkboxes__input" checked=""> -->
					<div class="govuk-!-display-inline">
                                            <div class="govuk-checkboxes__item sup_justify_content">
                                                <div class="govuk-checkboxes govuk-checkboxes--small" data-module="govuk-checkboxes">
                                                    <div class="govuk-checkboxes__item">
                                                
                                                        <input class="govuk-checkboxes__input" id="chkfinished" name="chkfinished" type="checkbox" value="finished" aria-label="Include inflation" checked="">
                                                        <label class="govuk-label govuk-checkboxes__label sup_label_auto_width" for="chkfinished">
                                                                              <span class="govuk-visually-hidden">Include inflation</span>
                                                        </label>
                                                    </div> 
                                                    
                                                </div>
                                          
                                            </div>
                                        </div>
                    <span class="edit-info-span-alt">Changing this option will recost existing projects
					with current rates as well as affecting inflation.</span>
					</div>
					
                </div>
                
                <div class="govuk-form-group  mb-2">
                     <label class="govuk-label d-inline-block me-1 label_width" for="date-of-submission">Date of Submission:</label>
                    <input type="text" value="05/11/2025" class="govuk-input width-200" id="date-of-submission">
                </div>
                
                <div class="govuk-form-group d-flex  mb-2">
                   <label class="govuk-label d-inline-block me-1 label_width" for="project-notes">Notes:</label>
                    <textarea class="govuk-textarea edit-textarea-wide" id="project-notes"></textarea>
                </div>
				
				 <div class="action-buttons edit-action-buttons-alt">
                   					
                    <button class="govuk-button" >
					<a href="Project-Requirement.html">Save</a> 
					</button>
                </div>

                               <input type="date" class="form-control" id="StaffName" name="StaffName">

                            <button type="submit" class="btn btn-primary">Save</button>
