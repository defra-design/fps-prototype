    <header class="govuk-header" role="banner">

                    <img src="../images/defra_logo.png" alt="Defra logo" width="80px">
                </div>
                <div class="pims-log">

            <div class="btn-group project-user-menu">

                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a href="../index.html" class="dropdown-item" type="button" aria-hidden="true">

                            Home</a></li>
                </ul>
            </div>
        </div>

    <div id="header"></div>

    <script>
        document.getElementById('header').innerHTML = htmlmenu;

                                    <div class="pcq-table-wrap">
                                        <table class="govuk-table custom-table" id="projectCostsTable">

                                            </thead>
                                            <tbody class="govuk-table__body" id="projectCostsTableBody">
                                                <!-- Rows rendered from JSON -->
                                            </tbody>
                                        </table>
                                    </div>

                                    <div class="sup_pagination_footer sup_border">

                                            <div class="sup_margin_top_bottom_5_10">
