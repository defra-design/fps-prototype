<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../css/custom-widget/global_styles.css" />
    <link rel="stylesheet" href="../css/pact_styles/style.css" />
    <!-- <link rel="stylesheet" href="css/custom_style.css" /> -->
    <link rel="stylesheet" href="../pact/nav_menu/navstyle.css" />
    <link rel="stylesheet" href="../css/govuk-frontend-6.0.0.min.css" />
    <script src="../pact/nav_menu/menutemplate.js"></script>
    <script src="../js/govuk-modal-dialog.js"></script>

    <title>2025-2026 : PACT Home page</title>
    <script type="text/css">
        function tablerowClick(str) {
            document.getElementById("project-code").value = str;
            document.getElementById("txt-description").value = "Sample comments for " + str + " goes here";
            document.getElementById("budget-cm").value = "£122";

            const rows = document.getElementsByTagName("tr"); // HTMLCollection
            for (let i = 0; i < rows.length; i++) {
                rows[i].addEventListener("click", function () {
                    const tds = this.getElementsByTagName("td");
                    for (let j = 0; j < tds.length; j++) {
                        tds[j].classList.toggle("tdbg");
                    }
                });
            }
        }



        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('collapsed');
        }
        function openNav() {
            document.getElementById("mySidenav").style.width = "250px";
        }

        function closeNav() {
            document.getElementById("mySidenav").style.width = "0";
        }
    </script>
</head>

<body>
    <div class="isPactHomePage govuk-main-wrapper govuk-!-padding-top-0">
        <div class="govuk-grid-row">
            <div class="govuk-grid-column-full govuk-!-padding-0 govuk-!-margin-0">
           
                <header>
                    <div class="header-nav">

                                    <option>2017-2018</option>
                                    <option>2018-2019</option>
                                    <option>2019-2020</option>
                                    <option>2020-2021</option>
                                    <option>2021-2022</option>
                                    <option>2022-2023</option>
                                    <option>2023-2024</option>
                                    <option>2024-2025</option>
                                    <option selected>2025-2026</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </header>
                <div id="header"></div>

                <script src="../pact/nav_menu/script.js"></script>
                <script>
                    document.getElementById('header').innerHTML = htmlmenu;
                    initMenu();

        <div class="govuk-grid-row">

                        Project Accounting for Cost and Time</h1>
                </div>
            </div>
        </div>

        <div class="govuk-grid-row">
            <div class="govuk-grid-column-full">
                <div class="govuk-footer sup_p_0 sup_margin_left_right_0">
                    <div class="govuk-width-container sup_p_8 sup_text_center"> <span> &copy; copyright Defra 2025
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
   

    <script>
        function addRow() {
            const table = document.getElementById("myTable").querySelector("tbody");

            const newRow = document.createElement("tr");
            newRow.setAttribute("onclick", "selectRow(this)");

            newRow.innerHTML = `
        <td>New Item</td>
        <td>${Date.now()}</td>
    `;

            table.appendChild(newRow);
        }

        function selectRow(row) {
            document.querySelectorAll("#myTable tbody tr")
                .forEach(r => r.classList.remove("selected-row"));

            row.classList.add("selected-row");
        }



    </script>

</body>
