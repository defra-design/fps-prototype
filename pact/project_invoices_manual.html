<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/custom-widget/global_styles.css" />
    <!-- <link href="https://design-system.service.gov.uk/stylesheets/govuk-frontend-110050e5900f36079383aecb46ca62bc.min.css" rel="stylesheet"/> -->
    <link rel="stylesheet" href="../css/pact_styles/govuk-frontend-6.0.0.min.css" />
    <link rel="stylesheet" href="../css/pact_styles/custom_style.css" />
    <link rel="stylesheet" href="nav_menu/navstyle.css" />
    <script src="nav_menu/menutemplate.js"></script>
    <script src="../js/govuk-modal-dialog.js"></script>
    <link rel="stylesheet" href="../css/pact_styles/style.css" />
    <link rel="stylesheet" href="../css/pact_styles/suppliement_style_over_gov.uk_style.css" />
    <title>2025-2026 : Project Management - PACT</title>
 
</head>

<body>
    <header>
        <div class="header-nav">

            <div class="pims-log-wrapper">

                <div>
                    <img src="../images/defra_logo.png" width="80px" alt="Animal & Plant Health Agency" />
                </div>

                <div class="pims-log">
                    <span>PACT</span>
                </div>

                <div class="pims-log" style="width: 160px;font-size: 16px;">
                    <label for="dpSelectyear" class="sr-only">select year</label>
                    <select id="dpSelectyear" aria-label="Select year dropdown" class="pims-log"
                        style="border: 0;border-radius: 0;margin-left: 0px;width: 150px;outline: 0;">
                        <option>2017-2018</option>
                        <option>2018-2019</option>
                        <option>2019-2020</option>
                        <option>2020-2021</option>
                        <option>2021-2022</option>
                        <option>2022-2023</option>
                        <option>2023-2024</option>
                        <option>2024-2025</option>
                        <option selected>2025-2026</option>
                    </select>

                </div>
            </div>




        </div>
    </header>
    <div id="header"></div>

    <script src="../pact/nav_menu/script.js"></script>

    <script>
        document.getElementById('header').innerHTML = htmlmenu;
        initMenu();
        btn();
    </script> 
    <div class="content-wrapper">
        <div class="govuk-grid-row sup_margin_left_right_0">
        <div class="govuk-grid-column-full">
            <h1 class="heading_with_txtbox govuk-heading-s sup_border-bottom sup_margin_bottom_10 p-tb-10 p-l-10">
                <div class="sup_flex_left_center">
                  Invoice Recording 
                </div> 
            </h1>
        </div>
    </div>

    <div class="govuk-grid-row sup_margin_left_right_0 sup_flex_left_center sup_padding_bottom_10 sup_border-bottom">
        <div class="govuk-grid-column-one-third">
                            <div class="govuk-form-group sup_margin_bottom_0">
                                    <label for="projectCodeSelect" class="govuk-label govuk-!-font-weight-bold">Project</label>
                                    <select id="projectCodeSelect" class="govuk-select sup_select_option_width_100 govuk-!-font-size-16" required>
                                        <option value="">-- Select Project --</option>
                                    </select>
                                </div>
                        </div>
                        <div class="govuk-grid-column-one-third">
                            <div class="tableselectdropdown input-group searchfiels" data-empdropdown data-source="months">
                                <label for="monthSelect" class="govuk-label govuk-!-font-weight-bold">Month</label>
                                <input type="text" id="monthSelect" placeholder="Select Month" class="dropdown-input down-arrow-img govuk-input govuk-!-font-size-16" />
                                <div class="tbl-dropdown-panel">
                                    
                                        <input type="text" class="select-search-box" placeholder="Type to search month" />
                                        <button type="button" class="govuk-button govuk-button--secondary clear-search-btn" aria-label="Clear search"><span class="sup_error_text_color govuk-!-font-size-19">&times;</span>
                                        </button>
                                     
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Sr. No</th>
                                                <th>Month</th>
                                            </tr>
                                        </thead>
                                        <tbody></tbody>
                                    </table>
                                </div>
                            </div>




                        </div>

                        

                        <div class="govuk-grid-column-one-third sup_p_0_mt_24">
                            <div class="govuk-button-group sup_margin_0 sup_float_right">
                                <!-- <button type="button" class="govuk-button govuk-button--warning sup_margin_0 sup_p_8"
                                    id="deleteSelectedBtn" aria-label="Delete selected invoices"
                                    data-module="govuk-button">
                                    Delete Selected
                                </button> -->
                                <!-- <button type="button" class="govuk-button sup_margin_0 sup_p_8 sup_flex" id="addInvoiceBtn"
                                    aria-label="Add invoice" data-module="govuk-button">
                                    <img alt="plus icon for add invoice" src="../images/circle-plus-solid-full-white.svg" width="16px" />
                                      &nbsp;Add Invoice
                                </button> -->
                            </div>
                        </div>
                    </div>

    <div class="sup_margin_top_10 sup_margin_bottom_10 sup_overflow_hidden">
        <div class="govuk-grid-column-full sup_padding_right_left_10">
            <div class="sup_border">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px; border-bottom: 1px solid #b1b4b6;">
                    <h2 class="govuk-heading-s" style="margin: 0;">Invoice Records</h2>
                    <div style="display: flex; gap: 8px;">
                        <!-- <button type="button" class="govuk-button sup_margin_0 sup_gov_blue_bg sup_flex sup_width_140" 
                            id="exportInvoiceExcel" aria-label="Export to Excel">
                            <img src="../images/file-export-solid-full.svg" width="16"
                                alt="icon for export data into excel file" />&nbsp; Export Excel
                        </button> -->
                        <button type="button" class="govuk-button sup_margin_0 sup_p_8" 
                            id="addInvoiceBtn" aria-label="Add Invoice" data-module="govuk-button">
                            + &nbsp; Add Invoice
                        </button>
                    </div>
                </div>
                
                <div class="table_scroll_wrapper">
                    <table class="govuk-table custom-table" id="invoiceTable">
                        <thead class="govuk-table__head">
                            <tr class="govuk-table__row">
                                <th data-column="0" scope="col" class="govuk-table__header">Project
                                    <div class="resizer">&nbsp;</div>
                                </th>
                                <th data-column="1" class="govuk-table__header">Month
                                    <div class="resizer">&nbsp;</div>
                                </th>
                                <th data-column="2" class="govuk-table__header">Amount
                                    <div class="resizer">&nbsp;</div>
                                </th>
                                <th data-column="3" class="govuk-table__header">Cost of Work
                                    <div class="resizer">&nbsp;</div>
                                </th>
                                <th data-column="4" class="govuk-table__header">WIP
                                    <div class="resizer">&nbsp;</div>
                                </th>
                                <th data-column="5" class="govuk-table__header">Profit/Loss
                                    <div class="resizer">&nbsp;</div>
                                </th>
                                <th data-column="6" class="govuk-table__header">Details
                                    <div class="resizer">&nbsp;</div>
                                </th>
                                <th data-column="7" class="govuk-table__header">Invoice Counter
                                    <div class="resizer">&nbsp;</div>
                                </th>
                                <th class="govuk-table__header">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="govuk-table__body" id="invoiceTableBody">
                            <!-- Data will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
                
                <div class="sup_pagination_wrapper sup_p_0">
                    <div class="sup_margin_top_bottom_5_10">
                        <label for="recordsPerPage">Records per page</label>
                        <select id="recordsPerPage" class="govuk-select govuk-select--width-2 govuk-!-font-size-16"
                            aria-label="Select number of records per page">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                            <option value="25">25</option>
                            <option value="30">30</option>
                        </select>
                    </div>
                    <nav class="govuk-pagination sup_margin_top_bottom_5_10" aria-label="Pagination">
                        <ul class="govuk-pagination__list" id="invoicePagination">
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    </div>
    <div class="govuk-grid-row">
    <div class="govuk-grid-column-full">
        <div class="govuk-footer sup_p_0 sup_margin_left_right_0">
            <div class="govuk-width-container sup_p_8 sup_text_center"> <span> &copy; copyright Defra 2025
                </span>
            </div>
        </div>
    </div>
</div> 

    <!-- Add/Edit Invoice Modal -->
    <div class="modal" id="addInvoiceModal" tabindex="-1">
        <div class="modal-dialog modal-custom">
            <div class="modal-content">
                <div class="modal-header flex-space-center">
                    <h3 class="modal-title m-0" id="invoiceModalLabel">Add Invoice</h3>
                    <button type="button" class="btn-close btn-red" id="closeInvoiceModalBtn">X</button>
                </div>
                <div class="modal-body" style="padding: 8px 16px 0 0px;">
                    <form class="govuk-grid-column-full" id="formAddInvoice">
                        <div class="govuk-grid-row" id="divInvoicecounter">
                             <div class="govuk-grid-column-one-half">
                                <div class="govuk-form-group sup_margin_bottom_10">
                                    <label for="txtmodal-invcntr" class="govuk-label govuk-!-font-weight-bold">Invoice Counter:</label>
                                    <input type="text" class="govuk-input govuk-!-font-size-16" id="txtmodal-invcntr" 
                                        name="invcntr" placeholder="Enter invoice counter" readonly disabled>
                                </div>
                            </div>
                        </div>
                        <div class="govuk-grid-row">
                     
                            <div class="govuk-grid-column-one-half">
                            <div class="govuk-form-group sup_margin_bottom_0">
                                    <label for="dpmodalproject" class="govuk-label govuk-!-font-weight-bold">Project <span class="sup_color_red">*</span></label>
                                    <select id="dpmodalproject" class="govuk-select sup_select_option_width_100 govuk-!-font-size-16" required>
                                        <option value="">-- Select Project --</option>
                                    </select>
                                </div>
                                </div>
                            <div class="govuk-grid-column-one-half">
                          
                                <div class="govuk-form-group sup_margin_bottom_10">
                                    <div class="tableselectdropdown input-group searchfiels" data-editmonthdropdown data-source="editmodal-month">
                                        <label for="txtmodal-month" class="govuk-label govuk-!-font-weight-bold">Month</label>
                                        <input type="text" id="txtmodal-month" placeholder="Select Month"
                                            class="dropdown-input down-arrow-img govuk-input govuk-!-font-size-16" />
                                        <div class="multicolumn-dropdown-panel tbl-dropdown-panel">
                                            <div class="search-box-wrapper">
                                                <input type="text" class="search-box" placeholder="Type to search month" />
                                                <button type="button" class="govuk-button govuk-button--secondary clear-search-btn"
                                                    aria-label="Clear search"><span class="sup_error_text_color">&times;</span>
                                                </button>
                                            </div>
                                            <table>
                                                <thead>
                                                    <tr>
                                                        <th>Sr. No</th>
                                                        <th>Month</th>
                                                    </tr>
                                                </thead>
                                                <tbody></tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="govuk-grid-row">
                            <div class="govuk-grid-column-one-half">
                                <div class="govuk-form-group sup_margin_bottom_10">
                                    <label for="txtmodal-amount" class="govuk-label govuk-!-font-weight-bold">Amount:</label>
                                    <div class="govuk-input__wrapper">
                                        <div class="govuk-input__prefix" aria-hidden="true">£</div>
                                        <input type="number" step="0.01" class="govuk-input govuk-!-font-size-16" id="txtmodal-amount" 
                                            name="amount" placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>
                            <div class="govuk-grid-column-one-half">
                                <div class="govuk-form-group sup_margin_bottom_10">
                                    <label for="txtmodal-costofwork" class="govuk-label govuk-!-font-weight-bold">Cost of Work:</label>
                                    <div class="govuk-input__wrapper">
                                        <div class="govuk-input__prefix" aria-hidden="true">£</div>
                                        <input type="number" step="0.01" class="govuk-input govuk-!-font-size-16" id="txtmodal-costofwork" 
                                            name="costofwork" placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="govuk-grid-row">
                            <div class="govuk-grid-column-one-half">
                                <div class="govuk-form-group sup_margin_bottom_10">
                                    <label for="txtmodal-wip" class="govuk-label govuk-!-font-weight-bold">WIP:</label>
                                    <div class="govuk-input__wrapper">
                                        <div class="govuk-input__prefix" aria-hidden="true">£</div>
                                        <input type="number" step="0.01" class="govuk-input govuk-!-font-size-16" id="txtmodal-wip" 
                                            name="wip" placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>
                            <div class="govuk-grid-column-one-half">
                                <div class="govuk-form-group sup_margin_bottom_10">
                                    <label for="txtmodal-profitloss" class="govuk-label govuk-!-font-weight-bold">Profit/Loss:</label>
                                    <div class="govuk-input__wrapper">
                                        <div class="govuk-input__prefix" aria-hidden="true">£</div>
                                        <input type="number" step="0.01" class="govuk-input govuk-!-font-size-16" id="txtmodal-profitloss" 
                                            name="profitloss" placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="govuk-grid-row">
                            <div class="govuk-grid-column-full">
                                <div class="govuk-form-group sup_margin_bottom_10">
                                    <label for="txtmodal-details" class="govuk-label govuk-!-font-weight-bold">Details:</label>
                                    <input type="text" class="govuk-input govuk-!-font-size-16" id="txtmodal-details" 
                                        name="details" placeholder="Enter details" required>
                                </div>
                            </div>
                           
                        </div>
                    </form>
                </div>
                <div class="modal-footer" 
                    style="display: flex; justify-content: space-between; align-items: center; flex-direction: row;">
                    <button class="govuk-button govuk-button--secondary sup_margin_0" 
                        aria-label="Cancel" id="cancelInvoiceModalBtn">Cancel</button>
                    <button class="govuk-button sup_margin_0" aria-label="Save" 
                        id="saveInvoiceBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Invoice Management Script -->
    <script src="../js/project_invoices_manual.js"></script>
</body>

</html>
